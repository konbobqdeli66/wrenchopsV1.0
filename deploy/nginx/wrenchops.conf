# Nginx site config for a DigitalOcean droplet.
#
# Assumptions:
# - React build is deployed to: /var/www/wrenchops/frontend/build
# - Backend runs via PM2 on: http://127.0.0.1:5000
# - You enable this file via: /etc/nginx/sites-available/wrenchops.conf -> sites-enabled

server {
    listen 80;
    # Replace/extend with your domain(s)
    server_name viatransport-service.xyz www.viatransport-service.xyz;

    root /var/www/wrenchops/frontend/build;
    index index.html;

    # React router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PWA manifest + icons (same-origin is required for install)
    location = /manifest.webmanifest {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /public/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API routes
    location /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(clients|orders|vehicles|worktimes|preferences|admin|password-recovery) {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Client portal (magic link) ---
    # The FRONTEND page is: /client-portal?token=...
    # The API endpoints are under: /client-portal/session, /client-portal/vehicles/...
    #
    # IMPORTANT:
    # If we define only `location /client-portal/ { ...proxy... }`, Nginx will 301-redirect
    # /client-portal -> /client-portal/ and the SPA route breaks (it hits the backend).
    # So we serve the SPA for the exact page routes, and proxy only the API subpaths.

    # SPA page (avoid auto-redirect to trailing slash)
    location = /client-portal {
        try_files /index.html =404;
    }
    location = /client-portal/ {
        try_files /index.html =404;
    }

    # API routes (proxy to backend)
    location ^~ /client-portal/session {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /client-portal/vehicles {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS (recommended)
# After DNS is pointing to your droplet IP (207.154.208.13), you can enable TLS via Certbot.
# Typical flow on Ubuntu:
# - apt install certbot python3-certbot-nginx
# - certbot --nginx -d viatransport-service.xyz -d www.viatransport-service.xyz

